<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Kaspa Trading Terminal</title>

<link rel="icon" href="Kaspa-Icon-32.png">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<img src="logo.svg" class="logo">

<h1>Kaspa Trading Terminal</h1>

</header>


<div class="dashboard">

<div class="card">

<h3>Precio</h3>

<div id="price">$0</div>

</div>


<div class="card">

<h3>Tendencia</h3>

<div id="trend">-</div>

</div>


<div class="card">

<h3>RSI</h3>

<div id="rsi">-</div>

</div>


<div class="card">

<h3>MACD</h3>

<div id="macd">-</div>

</div>

</div>


<div id="chart"></div>


<div class="signals">

<h2>Trading Signal</h2>

<div id="signalBox">Esperando datos...</div>

<div id="advisor"></div>

</div>


<script src="script.js"></script>

</body>

</html>
